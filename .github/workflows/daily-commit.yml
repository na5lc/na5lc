name: Daily Commit

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Update log file
        run: |
          echo "$(date -u '+%Y-%m-%d %H:%M:%S UTC'): Daily update" >> activity.log

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add activity.log
          git commit -m "Daily automated update - $(date -u '+%Y-%m-%d')" || exit 0
          git push
